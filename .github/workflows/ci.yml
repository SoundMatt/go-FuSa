name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Build and unit tests ──────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: go test (-race)
        shell: bash
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.22'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  # ── go generate check ─────────────────────────────────────────────────────
  generate:
    name: go generate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: go generate
        run: go generate ./...
      - name: Diff check (generated files must be committed)
        run: git diff --exit-code

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.6
          args: --timeout=5m
