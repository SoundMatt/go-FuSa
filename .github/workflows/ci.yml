name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Build and unit tests ──────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        shell: bash
        run: |
          pkgs=$(go list ./... 2>/dev/null | tr '\n' ' ')
          [ -z "$pkgs" ] && echo "no Go packages found" && exit 0
          go vet ./...

      - name: go test (-race)
        shell: bash
        run: |
          pkgs=$(go list ./... 2>/dev/null | tr '\n' ' ')
          [ -z "$pkgs" ] && echo "no Go packages found" && exit 0
          go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage gate (≥ 75 %)
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.22'
        shell: bash
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$3); print $3}')
          printf "Coverage: %.1f%%\n" "$pct"
          awk -v p="$pct" 'BEGIN{ if (p+0 < 75) { print "FAIL: coverage " p "% is below the 75% threshold"; exit 1 } print "PASS" }'

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.22'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  # ── go generate check ─────────────────────────────────────────────────────
  generate:
    name: go generate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: go generate
        run: go generate ./...
      - name: Diff check (generated files must be committed)
        run: git diff --exit-code

  # ── Docker build verification ────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build --tag go-fusa:ci .
      - name: Smoke-test binary in image
        run: docker run --rm go-fusa:ci version

  # ── Self-qualification ────────────────────────────────────────────────────
  qualify:
    name: Self-qualification
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Build gofusa from source
        run: go build -o gofusa ./cmd/gofusa

      - name: gofusa check (must pass — 0 errors)
        run: ./gofusa check --format json --output check-report.json

      - name: gofusa trace (all requirements must be traced+tested)
        run: ./gofusa trace

      - name: gofusa release (generate SBOM + provenance)
        run: ./gofusa release

      - name: gofusa verify (run tests, collect evidence)
        run: ./gofusa verify

      - name: gofusa qualify (44/44 must pass)
        run: ./gofusa qualify

      - name: Upload safety evidence bundle
        uses: actions/upload-artifact@v6
        with:
          name: safety-evidence
          path: |
            check-report.json
            .fusa-evidence.json
            sbom.json
            provenance.json
            qualify-report.json

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.6
          args: --timeout=5m
